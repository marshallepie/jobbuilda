[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "chromium"]

[phases.install]
cmds = ["cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[variables]
# Use the system Chromium installed by Nix instead of puppeteer's downloaded Chrome
PUPPETEER_SKIP_DOWNLOAD = "true"

[start]
cmd = "node dist/index.js"
