[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "chromium"]

[phases.install]
cmds = ["cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
PUPPETEER_EXECUTABLE_PATH = "/nix/var/nix/profiles/default/bin/chromium"

[start]
cmd = "node dist/index.js"
