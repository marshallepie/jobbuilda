[phases.setup]
nixPkgs = ["nodejs_20", "pnpm", "chromium"]

[phases.install]
cmds = ["cd ../.. && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm build"]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"

[start]
cmd = "sh -c 'export PUPPETEER_EXECUTABLE_PATH=$(command -v chromium || command -v chromium-browser || command -v google-chrome-stable); echo \"[start] chromium=$PUPPETEER_EXECUTABLE_PATH\"; exec node dist/index.js'"
